<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose CV Type</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h1>Choose CV Type</h1>

  <div class="type-container">

    <div class="type-card" onclick="selectType('academic')">
      <h2>🎓 Academic CV</h2>
      <p>For students, research, scholarships</p>
    </div>

    <div class="type-card" onclick="selectType('job')">
      <h2>💼 Job CV</h2>
      <p>For jobs and professional work</p>
    </div>

  </div>
</div>

<script src="js/choose-type.js"></script>
</body>
</html>
