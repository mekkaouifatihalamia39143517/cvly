<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVLY - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
            overflow-y: auto; 
            background: #f1f5f9;
            font-family: 'Inter', sans-serif;
        }

        .auth-page {
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding: 50px 20px; 
            box-sizing: border-box;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .auth-header { margin-bottom: 30px; }
        .auth-header .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #2563eb;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .auth-header p { color: #64748b; font-size: 14px; margin: 0; }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }

        .auth-divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: #cbd5e1;
            font-size: 12px;
            text-transform: uppercase;
        }
        .auth-divider::before, .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
            margin: 0 10px;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: white;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-secondary:hover { background: #f8fafc; }

        .auth-footer {
            margin-top: 25px;
            font-size: 14px;
            color: #64748b;
        }
        .auth-footer a { color: #2563eb; text-decoration: none; font-weight: 600; }
        .privacy-note { font-size: 11px; margin-top: 15px; color: #94a3b8; }
    </style>
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-file-signature"></i>
                    <span>CVLY</span>
                </div>
                <p>Sign in to manage your CVs</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="loginEmail" placeholder="name@company.com" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="auth-divider"><span>OR</span></div>

            <button id="demoLogin" class="btn-secondary">
                <i class="fas fa-magic"></i> Try Demo Mode
            </button>

            <div class="auth-footer">
                <p>New here? <a href="signup.html">Create an account</a></p>
                <p class="privacy-note">Secure login with local storage</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>

</body>
</html>
