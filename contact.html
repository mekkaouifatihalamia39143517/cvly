<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - CVLY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Inter;background:#f8fafc}
.container{max-width:800px;margin:auto;padding:40px}
.card{background:white;padding:30px;border-radius:16px}
input,textarea{width:100%;padding:12px;margin-top:10px;border:1px solid #ddd;border-radius:8px}
button{background:#2563eb;color:white;padding:12px;border:none;border-radius:8px;margin-top:15px;cursor:pointer}
</style>
</head>
<body>

<div class="container">
<div class="card">
<h1>Contact Us</h1>

<input type="text" placeholder="Your Name">
<input type="email" placeholder="Email">
<textarea rows="5" placeholder="Message"></textarea>

<button>Send Message</button>

</div>
</div>

</body>
</html>
